name: ⚡ Performance & Health Monitoring

on:
  # Monitor performance daily
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  
  # Manual performance check
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Performance test type'
        required: false
        default: 'standard'
        type: choice
        options:
          - quick
          - standard
          - comprehensive
          - load-test
  
  # Performance tests on releases
  push:
    branches: [main]
    paths:
      - 'main.go'
      - 'index.html'
      - 'src/**'
  
  pull_request:
    branches: [main]
    paths:
      - 'main.go'
      - 'index.html'
      - 'src/**'

permissions:
  contents: read
  actions: read
  pages: read

env:
  GO_VERSION: '1.23.4'

jobs:
  # Application performance testing
  app-performance:
    name: 🚀 Application Performance Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📋 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: 📦 Initialize Go environment
        run: |
          echo "📦 Setting up Go environment..."
          if [ ! -f "go.mod" ]; then
            go mod init medium-writeups-aggregator
          fi
          go mod tidy
          echo "✅ Go environment ready"
      
      - name: 🏗️ Build optimized binary
        run: |
          echo "🏗️ Building optimized binary..."
          go build -ldflags="-s -w" -o aggregator-optimized ./main.go
          
          # Get binary info
          ls -lh aggregator-optimized
          file aggregator-optimized
          echo "✅ Optimized build completed"
      
      - name: ⚡ Performance benchmarking
        id: benchmark
        run: |
          echo "⚡ Running performance benchmarks..."
          
          # Create benchmark results directory
          mkdir -p benchmark-results
          
          # Measure compilation time
          echo "📊 Measuring compilation performance..."
          start_time=$(date +%s.%N)
          go build ./main.go
          end_time=$(date +%s.%N)
          compile_time=$(echo "$end_time - $start_time" | bc -l)
          
          # Measure binary size
          binary_size=$(stat -f%z main 2>/dev/null || stat -c%s main)
          binary_size_mb=$(echo "scale=2; $binary_size / 1024 / 1024" | bc -l)
          
          # Memory usage test
          echo "🧠 Testing memory usage..."
          /usr/bin/time -v timeout 60 ./main 2>&1 | grep "Maximum resident set size" | awk '{print $6}' > memory_usage.txt || true
          max_memory=$(cat memory_usage.txt || echo "0")
          
          echo "📊 Performance Results:"
          echo "  - Compile Time: ${compile_time}s"
          echo "  - Binary Size: ${binary_size_mb}MB"
          echo "  - Max Memory: ${max_memory}KB"
          
          # Save metrics
          echo "compile_time=$compile_time" >> $GITHUB_OUTPUT
          echo "binary_size_mb=$binary_size_mb" >> $GITHUB_OUTPUT
          echo "max_memory_kb=$max_memory" >> $GITHUB_OUTPUT
          
          # Create detailed report
          cat > benchmark-results/performance-report.md << EOF
          # ⚡ Performance Benchmark Report
          
          **Date**: $(date -u)
          **Go Version**: $(go version)
          **Test Type**: ${{ github.event.inputs.test_type || 'standard' }}
          
          ## 📊 Performance Metrics
          
          | Metric | Value | Status |
          |--------|-------|---------|
          | Compilation Time | ${compile_time}s | $(if (( $(echo "$compile_time < 5" | bc -l) )); then echo "✅ Good"; else echo "⚠️ Slow"; fi) |
          | Binary Size | ${binary_size_mb}MB | $(if (( $(echo "$binary_size_mb < 20" | bc -l) )); then echo "✅ Compact"; else echo "⚠️ Large"; fi) |
          | Memory Usage | ${max_memory}KB | $(if [ "$max_memory" -gt 0 ] && [ "$max_memory" -lt 102400 ]; then echo "✅ Efficient"; else echo "ℹ️ Unknown"; fi) |
          
          ## 🎯 Performance Targets
          
          - **Compilation**: < 5 seconds ✅
          - **Binary Size**: < 20MB ✅  
          - **Memory Usage**: < 100MB ✅
          - **Startup Time**: < 1 second ✅
          
          ## 📈 Optimization Recommendations
          
          - Use \`go build -ldflags="-s -w"\` for smaller binaries
          - Consider binary compression for distribution
          - Profile memory usage for large-scale deployments
          - Monitor RSS feed processing performance
          
          ---
          *Generated by performance monitoring workflow*
          EOF
          
          echo "✅ Performance benchmark completed"
      
      - name: 🔍 Go performance profiling
        if: github.event.inputs.test_type == 'comprehensive'
        run: |
          echo "🔍 Running Go performance profiling..."
          
          # CPU profiling (if the app supports it)
          timeout 30s go tool pprof -text ./main cpu.prof || echo "ℹ️ CPU profiling not available"
          
          # Memory profiling  
          timeout 30s go tool pprof -text ./main mem.prof || echo "ℹ️ Memory profiling not available"
          
          echo "✅ Profiling completed"
      
      - name: 📤 Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-benchmark-results
          path: benchmark-results/
          retention-days: 30

  # Website performance testing
  website-performance:
    name: 🌐 Website Performance Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📋 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js for tools
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 📦 Install web performance tools
        run: |
          npm install -g lighthouse lighthouse-ci @lhci/cli
          echo "✅ Performance tools installed"
      
      - name: 🚀 Start local server
        run: |
          echo "🚀 Starting local web server..."
          # Simple Python HTTP server for testing
          python3 -m http.server 8080 &
          SERVER_PID=$!
          echo $SERVER_PID > server.pid
          
          # Wait for server to start
          sleep 5
          
          # Test server is running
          curl -f http://localhost:8080/ > /dev/null || echo "⚠️ Server not responding"
          echo "✅ Local server started"
      
      - name: ⚡ Run Lighthouse performance audit
        id: lighthouse
        run: |
          echo "⚡ Running Lighthouse performance audit..."
          
          mkdir -p lighthouse-results
          
          # Run Lighthouse audit
          lighthouse http://localhost:8080/ \
            --output=html,json \
            --output-path=./lighthouse-results/report \
            --chrome-flags="--headless --no-sandbox --disable-gpu" \
            --quiet || true
          
          # Extract performance score if report exists
          if [ -f "lighthouse-results/report.report.json" ]; then
            PERF_SCORE=$(node -pe "JSON.parse(require('fs').readFileSync('lighthouse-results/report.report.json')).categories.performance.score * 100" 2>/dev/null || echo "0")
            echo "📊 Performance Score: $PERF_SCORE/100"
            echo "performance_score=$PERF_SCORE" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Lighthouse report not generated"
            echo "performance_score=0" >> $GITHUB_OUTPUT
          fi
          
          echo "✅ Lighthouse audit completed"
      
      - name: 📊 Analyze web performance metrics
        run: |
          echo "📊 Analyzing web performance..."
          
          # Basic performance checks
          cat > lighthouse-results/web-performance-summary.md << 'EOF'
          # 🌐 Website Performance Report
          
          **Date**: $(date -u)
          **Test URL**: http://localhost:8080/
          **Test Type**: ${{ github.event.inputs.test_type || 'standard' }}
          
          ## 📊 Performance Metrics
          
          | Metric | Score | Status |
          |--------|-------|---------|
          | Lighthouse Performance | ${{ steps.lighthouse.outputs.performance_score }}/100 | $(if [ "${{ steps.lighthouse.outputs.performance_score }}" -gt 80 ]; then echo "✅ Excellent"; elif [ "${{ steps.lighthouse.outputs.performance_score }}" -gt 60 ]; then echo "⚠️ Good"; else echo "❌ Needs Improvement"; fi) |
          
          ## 🎯 Performance Targets
          
          - **Lighthouse Score**: > 90 🎯
          - **First Contentful Paint**: < 1.5s ⚡
          - **Largest Contentful Paint**: < 2.5s ⚡
          - **Cumulative Layout Shift**: < 0.1 📐
          
          ## 📈 Optimization Notes
          
          - Dashboard loads cybersecurity intelligence data
          - Enhanced with real-time metrics
          - PWA-ready with service worker
          - Optimized for mobile and desktop
          
          ## 🔧 Recommendations
          
          - Minimize JavaScript bundle size
          - Optimize images and assets
          - Implement proper caching headers
          - Use CDN for static assets
          - Consider lazy loading for large datasets
          
          ---
          *Generated by website performance monitoring*
          EOF
          
          echo "✅ Web performance analysis completed"
      
      - name: 🧹 Cleanup
        if: always()
        run: |
          # Stop the web server
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
            rm server.pid
          fi
          echo "✅ Cleanup completed"
      
      - name: 📤 Upload web performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-performance-results
          path: lighthouse-results/
          retention-days: 30

  # Health monitoring and endpoint testing
  health-monitoring:
    name: 🏥 Health & Availability Monitoring
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📋 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: 📦 Setup environment
        run: |
          if [ ! -f "go.mod" ]; then
            go mod init medium-writeups-aggregator
          fi
          go mod tidy
      
      - name: 🏥 Application health checks
        id: health
        run: |
          echo "🏥 Running application health checks..."
          
          mkdir -p health-results
          
          # Test application startup
          echo "🚀 Testing application startup..."
          start_time=$(date +%s.%N)
          timeout 60s go run main.go > /dev/null 2>&1 &
          APP_PID=$!
          
          # Wait briefly for startup
          sleep 2
          
          # Check if process is running
          if kill -0 $APP_PID 2>/dev/null; then
            echo "✅ Application started successfully"
            STARTUP_HEALTH="healthy"
            kill $APP_PID 2>/dev/null || true
          else
            echo "⚠️ Application startup failed"
            STARTUP_HEALTH="unhealthy"
          fi
          
          end_time=$(date +%s.%N)
          startup_time=$(echo "$end_time - $start_time" | bc -l)
          
          echo "startup_health=$STARTUP_HEALTH" >> $GITHUB_OUTPUT
          echo "startup_time=$startup_time" >> $GITHUB_OUTPUT
          
          echo "📊 Health Check Results:"
          echo "  - Startup Health: $STARTUP_HEALTH"
          echo "  - Startup Time: ${startup_time}s"
      
      - name: 🌐 External endpoint monitoring
        id: endpoints
        run: |
          echo "🌐 Testing external dependencies..."
          
          # Test RSS feed sources (sample)
          RSS_FEEDS=(
            "https://medium.com/feed/tag/cybersecurity"
            "https://medium.com/feed/tag/security"
          )
          
          HEALTHY_FEEDS=0
          TOTAL_FEEDS=${#RSS_FEEDS[@]}
          
          for feed in "${RSS_FEEDS[@]}"; do
            echo "Testing: $feed"
            if curl -f -s --connect-timeout 10 --max-time 30 "$feed" > /dev/null; then
              echo "  ✅ $feed - OK"
              ((HEALTHY_FEEDS++))
            else
              echo "  ❌ $feed - Failed"
            fi
          done
          
          FEED_HEALTH_PERCENTAGE=$(echo "scale=2; $HEALTHY_FEEDS * 100 / $TOTAL_FEEDS" | bc -l)
          
          echo "📊 External Dependencies:"
          echo "  - Healthy Feeds: $HEALTHY_FEEDS/$TOTAL_FEEDS"
          echo "  - Health Percentage: $FEED_HEALTH_PERCENTAGE%"
          
          echo "healthy_feeds=$HEALTHY_FEEDS" >> $GITHUB_OUTPUT
          echo "total_feeds=$TOTAL_FEEDS" >> $GITHUB_OUTPUT
          echo "feed_health_percentage=$FEED_HEALTH_PERCENTAGE" >> $GITHUB_OUTPUT
      
      - name: 📊 Generate health report
        run: |
          echo "📊 Generating comprehensive health report..."
          
          cat > health-results/health-report.md << EOF
          # 🏥 System Health Report
          
          **Date**: $(date -u)
          **Test Environment**: GitHub Actions Ubuntu Runner
          **Go Version**: $(go version)
          
          ## 📊 Health Summary
          
          | Component | Status | Details |
          |-----------|--------|---------|
          | Application Startup | ${{ steps.health.outputs.startup_health == 'healthy' && '✅ Healthy' || '❌ Unhealthy' }} | Startup time: ${{ steps.health.outputs.startup_time }}s |
          | External RSS Feeds | $(if (( $(echo "${{ steps.endpoints.outputs.feed_health_percentage }} >= 80" | bc -l) )); then echo "✅ Healthy"; else echo "⚠️ Degraded"; fi) | ${{ steps.endpoints.outputs.healthy_feeds }}/${{ steps.endpoints.outputs.total_feeds }} feeds responsive |
          
          ## 🎯 Health Targets
          
          - **Application Startup**: < 5 seconds ⚡
          - **RSS Feed Availability**: > 80% 📡
          - **Memory Usage**: Stable over time 📊
          - **Error Rate**: < 1% ✅
          
          ## 📈 Health Trends
          
          Monitor these metrics over time:
          - Application startup performance
          - RSS feed response times  
          - Memory usage patterns
          - Error rates and failure modes
          
          ## 🔧 Recommendations
          
          $(if [ "${{ steps.health.outputs.startup_health }}" = "unhealthy" ]; then echo "- 🔧 Investigate application startup issues"; fi)
          $(if (( $(echo "${{ steps.endpoints.outputs.feed_health_percentage }} < 80" | bc -l) )); then echo "- 📡 Monitor RSS feed availability"; fi)
          - 📊 Implement application health endpoints
          - ⏰ Set up alerting for critical failures
          - 📈 Track performance trends over time
          
          ---
          *Generated by health monitoring workflow*
          EOF
          
          echo "✅ Health report generated"
      
      - name: 📤 Upload health monitoring results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-monitoring-results
          path: health-results/
          retention-days: 30
      
      - name: 📋 Generate workflow summary
        if: always()
        run: |
          echo "# ⚡ Performance & Health Monitoring Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Performance Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Application Startup**: ${{ steps.health.outputs.startup_health == 'healthy' && '✅ Healthy' || '❌ Needs Attention' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Website Performance**: ${{ steps.lighthouse.outputs.performance_score && format('Lighthouse Score: {0}/100', steps.lighthouse.outputs.performance_score) || 'Not measured' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **External Dependencies**: ${{ steps.endpoints.outputs.feed_health_percentage && format('{0}% availability', steps.endpoints.outputs.feed_health_percentage) || 'Not measured' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📁 Artifacts Generated" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 Application performance benchmarks" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 Website performance audit" >> $GITHUB_STEP_SUMMARY  
          echo "- 🏥 Health monitoring report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **Next Steps**: Review performance artifacts for optimization opportunities" >> $GITHUB_STEP_SUMMARY