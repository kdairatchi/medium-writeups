name: 🛡️ Cybersecurity Dashboard - Main Aggregation

on:
  # Run every 2 hours for reliable updates
  schedule:
    - cron: '0 */2 * * *'
  
  # Manual trigger for testing and emergency updates
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if no new content'
        required: false
        default: 'false'
        type: boolean
      debug_mode:
        description: 'Enable verbose debug output'
        required: false
        default: 'false'
        type: boolean
  
  # Auto-trigger on code changes
  push:
    branches: [main]
    paths:
      - 'main.go'
      - '.github/workflows/actions.yml'
      - 'go.mod'
      - 'go.sum'
      - 'index.html'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

env:
  GO_VERSION: '1.23.4'
  MAX_RETRIES: 3
  TIMEOUT_SECONDS: 300

jobs:
  # Streamlined build, aggregate and deploy job
  aggregate-and-deploy:
    name: 📰 Aggregate Content & Deploy Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    # Configure Pages deployment environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 📋 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: 📦 Initialize Go environment
        run: |
          echo "📦 Setting up Go environment..."
          if [ ! -f "go.mod" ]; then
            go mod init medium-writeups-aggregator
          fi
          go mod tidy
          echo "✅ Go environment ready"
      
      - name: 🏗️ Build and validate application
        run: |
          echo "🔨 Building aggregator..."
          go build -v -o aggregator ./main.go
          go vet ./...
          echo "✅ Build successful"
      
      - name: 🚀 Run cybersecurity content aggregation
        id: aggregate
        run: |
          echo "🚀 Starting cybersecurity content aggregation..."
          
          # Backup existing README if it exists
          [ -f README.md ] && cp README.md README.md.backup
          
          # Run aggregation with retry logic
          RETRY_COUNT=0
          SUCCESS=false
          
          while [ $RETRY_COUNT -lt ${{ env.MAX_RETRIES }} ] && [ "$SUCCESS" = "false" ]; do
            echo "🔄 Attempt $((RETRY_COUNT + 1))/${{ env.MAX_RETRIES }}"
            
            if timeout ${{ env.TIMEOUT_SECONDS }} go run main.go > NEW_README.md 2>&1; then
              # Validate output
              if [ -s NEW_README.md ] && [ "$(wc -w < NEW_README.md)" -gt 100 ]; then
                echo "✅ Aggregation successful"
                SUCCESS=true
                break
              fi
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            [ $RETRY_COUNT -lt ${{ env.MAX_RETRIES }} ] && sleep 30
          done
          
          if [ "$SUCCESS" = "false" ]; then
            echo "❌ Aggregation failed after all retries"
            exit 1
          fi
          
          echo "success=true" >> $GITHUB_OUTPUT
      
      - name: 📊 Process and validate results
        id: process
        if: steps.aggregate.outputs.success == 'true'
        run: |
          echo "📊 Processing aggregation results..."
          
          # Clean up ANSI codes and validate content
          sed -i 's/\x1b\[[0-9;]*m//g' NEW_README.md
          
          # Extract key metrics
          WORD_COUNT=$(wc -w < NEW_README.md)
          TOTAL_POSTS=$(grep -o "Total Posts.*[0-9]\+" NEW_README.md | grep -o "[0-9]\+" | head -1 || echo "0")
          NEW_POSTS=$(grep -o "New Posts.*[0-9]\+" NEW_README.md | grep -o "[0-9]\+" | head -1 || echo "0")
          
          echo "📈 Content Summary:"
          echo "  - Words: $WORD_COUNT"
          echo "  - Total Posts: $TOTAL_POSTS"
          echo "  - New Posts: $NEW_POSTS"
          
          # Set outputs for commit message
          echo "total_posts=$TOTAL_POSTS" >> $GITHUB_OUTPUT
          echo "new_posts=$NEW_POSTS" >> $GITHUB_OUTPUT
          echo "word_count=$WORD_COUNT" >> $GITHUB_OUTPUT
      
      - name: 🔍 Determine if update needed
        id: compare
        run: |
          echo "🔍 Checking if update is needed..."
          
          SHOULD_UPDATE=false
          FORCE_UPDATE="${{ github.event.inputs.force_update }}"
          NEW_COUNT="${{ steps.process.outputs.new_posts }}"
          
          if [ "$FORCE_UPDATE" = "true" ]; then
            echo "🔄 Force update requested"
            SHOULD_UPDATE=true
          elif [ ! -f README.md.backup ] || [ ! -s README.md.backup ]; then
            echo "📄 No previous content found"
            SHOULD_UPDATE=true
          elif [ "$NEW_COUNT" -gt 0 ]; then
            echo "📝 New posts detected ($NEW_COUNT new posts)"
            SHOULD_UPDATE=true
          else
            echo "📋 No significant changes detected"
          fi
          
          echo "should_update=$SHOULD_UPDATE" >> $GITHUB_OUTPUT
      
      - name: 📝 Update content files
        if: steps.compare.outputs.should_update == 'true'
        run: |
          echo "📝 Updating content files..."
          mv NEW_README.md README.md
          echo "✅ README.md updated successfully"
      
      - name: 📤 Commit changes
        if: steps.compare.outputs.should_update == 'true'
        id: commit
        run: |
          echo "📤 Committing updated content..."
          
          git config --global user.name 'Cybersecurity Bot'
          git config --global user.email 'cyber-bot@users.noreply.github.com'
          
          git add README.md index.html || true
          
          if ! git diff --cached --exit-code >/dev/null; then
            TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "🛡️ Update Cybersecurity Dashboard - $TIMESTAMP

📊 Content Summary:
• Total Posts: ${{ steps.process.outputs.total_posts }}
• New Posts: ${{ steps.process.outputs.new_posts }}
• Size: ${{ steps.process.outputs.word_count }} words

🤖 Generated with Claude Code

Co-Authored-By: Claude <noreply@anthropic.com>"
            
            # Push with retry logic
            for i in {1..3}; do
              if git push origin main; then
                echo "✅ Changes committed successfully"
                echo "committed=true" >> $GITHUB_OUTPUT
                break
              else
                echo "⚠️ Push attempt $i failed"
                [ $i -lt 3 ] && sleep 10
              fi
            done
          else
            echo "ℹ️ No changes to commit"
            echo "committed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: 🔧 Setup Pages deployment
        if: steps.aggregate.outputs.success == 'true'
        uses: actions/configure-pages@v4
      
      - name: 📦 Upload Pages artifact
        if: steps.aggregate.outputs.success == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: 🚀 Deploy to GitHub Pages
        if: steps.aggregate.outputs.success == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -f NEW_README.md README.md.backup || true
          echo "✅ Cleanup completed"
      
      - name: 📋 Generate summary
        if: always()
        run: |
          echo "# 🛡️ Cybersecurity Dashboard Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Execution Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Aggregation**: ${{ steps.aggregate.outputs.success == 'true' && '✅ Success' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Content Updated**: ${{ steps.compare.outputs.should_update == 'true' && '✅ Yes' || '⏭️ No changes' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Pages Deployed**: ${{ steps.deployment.outputs.page_url && '✅ Success' || '⚠️ Skipped' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.process.outputs.total_posts }}" != "" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 📈 Content Statistics" >> $GITHUB_STEP_SUMMARY
            echo "- **Total Posts**: ${{ steps.process.outputs.total_posts }}" >> $GITHUB_STEP_SUMMARY
            echo "- **New Posts**: ${{ steps.process.outputs.new_posts }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.deployment.outputs.page_url }}" != "" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🌐 **Dashboard URL**: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          fi

  # Failure handling and notification
  handle-failure:
    name: 🚨 Handle Workflow Failures
    runs-on: ubuntu-latest
    needs: [aggregate-and-deploy]
    if: failure()
    
    steps:
      - name: 📝 Create failure notification
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Cybersecurity Dashboard Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## 🚨 Dashboard Aggregation Failed
            
            **Failure Details:**
            - **Time**: ${new Date().toISOString()}
            - **Run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - **Trigger**: ${{ github.event_name }}
            
            **Common Solutions:**
            1. ⏳ Wait 2-4 hours for rate limits to reset
            2. 🔧 Check main.go compilation
            3. 🔄 Manually trigger with force_update=true
            
            *Auto-generated failure notification*`;
            
            // Only create if no open failure issues exist
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'workflow-failure',
              state: 'open'
            });
            
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['workflow-failure', 'automated']
              });
            }